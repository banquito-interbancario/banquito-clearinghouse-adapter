# APP
spring.application.name=banquito-clearinghouse-adapter
server.port=${SERVER_PORT:8087}

# MONGODB
# URI-based MongoDB connection (takes precedence if provided, e.g. Mongo Atlas)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:}}
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:}}

# Host-based MongoDB connection (fallback if URI is not provided)
spring.mongodb.host=${MONGODB_HOST:localhost}
spring.mongodb.port=${MONGODB_PORT:27017}
spring.mongodb.database=${MONGODB_DATABASE:clearingdb}

# KAFKA (Confluent Cloud - SASL_SSL)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:org.apache.kafka.common.security.plain.PlainLoginModule required username="" password="";}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:clearinghouse-adapter}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.clearing-topic=${KAFKA_CLEARING_TOPIC:clearing-outbound}

# ACCOUNTING SERVICE
accounting.service.url=${ACCOUNTING_SERVICE_URL:http://localhost:8010/api/v2/accounting/entries}

# COMPENSATION FILE
compensation.output.dir=${COMPENSATION_OUTPUT_DIR:}

# ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# LOGGING
logging.level.root=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.data.mongodb=INFO
